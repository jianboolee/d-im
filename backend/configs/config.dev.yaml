app:
  name: d-im
  version: "1.0.0"
  env: development

server:
  gateway:
    http_port: 8080
    grpc_port: 9080
  connector:
    ws_port: 8081
    tcp_port: 8082

mongodb:
  uri: mongodb://localhost:27018
  database: im_db
  pool_size: 100
  timeout: 10

redis:
  addr: localhost:6380
  password: ""
  db: 0
  pool_size: 50

nats:
  url: nats://localhost:4223
  user: ""
  password: ""
  publish_timeout: 2s
  subjects:
    message_send: im.message.send
    message_push: im.message.push
    message_event: im.message.event
    user_created: dsaas.user.created
    user_updated: dsaas.user.profile_updated
    user_status: dsaas.user.status_changed
    user_deleted: dsaas.user.deleted

snowflake:
  worker_id: 1
  datacenter_id: 1

jwt:
  secret: im-secret-key-change-me
  access_expire: 15m
  refresh_expire: 168h
  ticket_expire: 5m
  api_key: im-api-key-change-me

log:
  level: debug
  format: console
  output: stdout