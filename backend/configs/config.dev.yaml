app:
  name: d-im
  version: "1.0.0"
  env: development
  frontend_url: http://localhost:5173

auth:
  super_password: ""

server:
  gateway:
    http_port: 8080
    grpc_port: 9080
  connector:
    ws_port: 8081
    tcp_port: 8082

mongodb:
  uri: mongodb://localhost:27018
  database: im_db
  pool_size: 100
  timeout: 10

redis:
  addr: localhost:6380
  password: ""
  db: 0
  pool_size: 50

nats:
  url: nats://localhost:4223
  user: ""
  password: ""
  publish_timeout: 2s
  subjects:
    message_send: im.message.send
    message_push: im.message.push
    message_event: im.message.event
    user_created: dimuser.created
    user_updated: dimuser.profile_updated
    user_status: dimuser.status_changed
    user_deleted: dimuser.deleted

jwt:
  secret: im-secret-key-change-me
  access_expire: 15m
  refresh_expire: 168h
  ticket_expire: 5m
  api_key: im-api-key-change-me

log:
  level: debug
  format: console
  output: stdout

storage:
  provider: local
  public_base_url: http://localhost:8080
  max_image_size: 20971520
  local:
    root_dir: ./data/media
    url_prefix: /media
  aliyun_oss:
    endpoint: ""
    access_key_id: ""
    access_key_secret: ""
    bucket: ""
    directory: /media
    public_base_url: ""
  qiniu:
    access_key: ""
    secret_key: ""
    bucket: ""
    region: ""
    public_base_url: ""
