app:
  name: d-im
  version: "1.0.0"
  env: production
  frontend_url: http://localhost:5173

auth:
  super_password: ""

group:
  max_members: 100

server:
  gateway:
    http_port: 8080
    grpc_port: 9080
  connector:
    ws_port: 8081
    tcp_port: 8082

mongodb:
  uri: mongodb://mongo:27017
  database: im_db
  pool_size: 100
  timeout: 10

redis:
  addr: redis:6379
  password: ""
  db: 0
  pool_size: 100

nats:
  url: nats://nats:4222
  user: ""
  password: ""
  publish_timeout: 2s
  subjects:
    message_send: im.message.send
    message_push: im.message.push
    message_event: im.message.event

jwt:
  secret: change-me-in-production
  access_expire: 15m
  refresh_expire: 168h
  ticket_expire: 5m
  api_key: change-me-in-production

log:
  level: info
  format: json
  output: stdout

storage:
  provider: local
  public_base_url: http://localhost:8080
  max_image_size: 20971520
  local:
    root_dir: ./data/media
    url_prefix: /media
  aliyun_oss:
    endpoint: ""
    access_key_id: ""
    access_key_secret: ""
    bucket: ""
    directory: /media
    public_base_url: ""
  qiniu:
    access_key: ""
    secret_key: ""
    bucket: ""
    region: ""
    public_base_url: ""
